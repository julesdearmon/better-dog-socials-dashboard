name: Refresh & deploy dashboard

# Rebuilds public/data.json and publishes the static site to GitHub Pages.
# Supermetrics is the only approved source for published dashboard data.
on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC is 6:00 AM US-Eastern during daylight time.
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull fresh data
        env:
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
          DISPLAY_TZ: America/New_York
        run: |
          if [ -z "$SUPERMETRICS_API_KEY" ]; then
            echo "::error::SUPERMETRICS_API_KEY is required. Dashboard data must come from Supermetrics only."
            exit 1
          fi
          echo "Using Supermetrics API."
          node scripts/build-data.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
