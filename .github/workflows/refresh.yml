name: Refresh & deploy dashboard

# Rebuilds public/data.json and publishes the static site to GitHub Pages.
# Preferred source is direct platform APIs. Supermetrics remains a fallback
# while the direct credentials are being connected.
on:
  schedule:
    - cron: '5 10 * * *'   # 10:05 UTC is about 6:05 AM US-Eastern.
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull fresh data
        env:
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
          META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          DISPLAY_TZ: America/New_York
        run: |
          if [ -n "$META_USER_ACCESS_TOKEN" ] || [ -n "$META_PAGE_ACCESS_TOKEN" ] || [ -n "$META_ACCESS_TOKEN" ] || \
             { [ -n "$YOUTUBE_CLIENT_ID" ] && [ -n "$YOUTUBE_CLIENT_SECRET" ] && [ -n "$YOUTUBE_REFRESH_TOKEN" ]; } || \
             { [ -n "$TIKTOK_CLIENT_KEY" ] && [ -n "$TIKTOK_CLIENT_SECRET" ] && [ -n "$TIKTOK_REFRESH_TOKEN" ]; }; then
            echo "Using direct platform APIs."
            node scripts/build-data-direct.mjs
          elif [ -n "$SUPERMETRICS_API_KEY" ]; then
            echo "Using Supermetrics API fallback."
            node scripts/build-data.mjs
          else
            echo "::warning::No API credentials set - deploying committed data.json as a seed. Add direct API secrets to enable daily refresh."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
