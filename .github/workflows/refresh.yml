name: Validate dashboard data

# GitHub Pages now publishes from the gh-pages branch.
# Daily data refresh is handled by the Codex Supermetrics automation.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dashboard-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dashboard data
        run: node scripts/validate-dashboard-data.mjs
